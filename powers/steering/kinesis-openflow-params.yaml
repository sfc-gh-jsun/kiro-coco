# Kinesis + Openflow: Streaming Ingestion Parameters
# Referenced by README.md placeholders (e.g., <AWS_REGION>).
#
# source:
#   auto     = detected from AWS CLI / Snowflake connection
#   user     = must be provided by the user
#   runtime  = populated during setup (e.g., after deploy)

# --- AWS (auto: from aws sts get-caller-identity / aws configure) ---
AWS_REGION: ""           # [auto] from aws configure get region
AWS_PROFILE: ""          # [auto] from active AWS CLI profile
AWS_ACCESS_KEY: ""       # [auto] from aws configure get aws_access_key_id
AWS_SECRET_KEY: ""       # [auto] from aws configure get aws_secret_access_key

# --- Kinesis (user) ---
STREAM_NAME: ""          # [user] Kinesis Data Stream name, e.g. my-events-stream
APP_NAME: ""             # [user] KCL application name (becomes DynamoDB table), e.g. my-kinesis-consumer

# --- Snowflake (auto: from active Snowflake connection) ---
DB_NAME: ""              # [user] destination database, e.g. KINESIS_DB
TABLE_NAME: ""           # [user] destination table, e.g. RAW_EVENTS
WAREHOUSE: ""            # [auto] from Snowflake connection
OPENFLOW_ROLE: ""        # [auto] from Snowflake connection / Openflow runtime

# --- Openflow (auto/user + runtime) ---
OPENFLOW_PROFILE: ""     # [auto] from nipyapi profiles list_profiles, or [user] if creating new
PG_ID: ""                # [runtime] process group ID, populated after deploy
