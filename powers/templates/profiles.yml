# nipyapi profiles template
# Copy to ~/.nipyapi/profiles.yml and replace placeholders
#
# Values come from:
#   <PROFILE_NAME>   — runtime key from SHOW OPENFLOW RUNTIME INTEGRATIONS (e.g., spcs1, byoc1)
#   <NIFI_API_URL>   — derived from OAUTH_REDIRECT_URI: https://<host>/<runtime_key>/nifi-api
#   <BEARER_TOKEN>   — password field from ~/.snowflake/connections.toml

<PROFILE_NAME>:
  nifi_url: "<NIFI_API_URL>"
  nifi_bearer_token: "<BEARER_TOKEN>"
