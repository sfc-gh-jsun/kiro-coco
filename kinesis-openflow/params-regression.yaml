# Kinesis + Openflow: Regression Test Parameters
# Pre-filled for HOL environment — used by references/regression.md
# No interactive prompts needed when these are set.

# --- AWS ---
AWS_REGION: "us-west-2"
AWS_PROFILE: "jsnow"
AWS_ACCESS_KEY: "AKIAXBUYSSFIFQEVCHFR"
AWS_SECRET_KEY: ""               # SENSITIVE — fill before run, clear after

# --- Kinesis ---
STREAM_NAME: "opensky-regression-stream"
APP_NAME: "opensky-regression-consumer"

# --- Kinesis Consumer (modularized connector only) ---
KINESIS_CONSUMER_TYPE: "SHARED_THROUGHPUT"    # Valid: SHARED_THROUGHPUT | ENHANCED_FAN_OUT
                                              # SHARED_THROUGHPUT = polling, starts immediately
                                              # ENHANCED_FAN_OUT = dedicated throughput, 10-min init on first run
                                              # WARNING: Do NOT use "POLLING" — it is invalid and causes INVALID state
KINESIS_INITIAL_STREAM_POSITION: "TRIM_HORIZON"  # TRIM_HORIZON = read from oldest record
                                              # LATEST = read only new records after consumer starts

# --- Snowflake ---
SNOWFLAKE_CONNECTION: "HOL"
DB_NAME: "KINESIS_REGRESSION_DB"
TABLE_NAME: "FLIGHT_DATA"             # Legacy connector only. Modularized connector ignores this —
                                       # it auto-creates a table named after the stream (see AUTO_TABLE_NAME).
AUTO_TABLE_NAME: "OPENSKY-REGRESSION-STREAM"  # [modularized only] Auto-created by schema evolution.
                                       # Named after STREAM_NAME, uppercased. Must be quoted in SQL
                                       # due to hyphens: "OPENSKY-REGRESSION-STREAM"
WAREHOUSE: "ADF_PL_WH"
OPENFLOW_ROLE: "ADF_PL_RL"

# --- Openflow (SPCS) ---
OPENFLOW_PROFILE: "spcs1-regression-test"
OPENFLOW_DATAPLANE_INTEGRATION: "OPENFLOW_DATAPLANE_ABABC0BA_0EEB_48AA_BDCA_40EF0D32855C"
OPENFLOW_RUNTIME_INTEGRATION: "OPENFLOW_RUNTIME_FE75B6A1_16A9_81C4_B4D1_F7C3FE11FA36"
OPENFLOW_RUNTIME_SERVICE: "ADF_PL_DB.ADF_PL_SCHEMA.OPENFLOW_RDS_PL"
OPENFLOW_DATAPLANE_SERVICE: "ADF_PL_DB.ADF_PL_SCHEMA.OPENFLOW_MSK_PUBLIC"
CONNECTOR_FLOW: "kinesis-json-modularized"   # flow name in regression runtime registry
EAI_NAME: "kinesis_regression_eai"
NETWORK_RULE_NAME: "kinesis_regression_network_rule"
